<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="faqPage-text"></title>
    <link type="image/png" sizes="50x50" rel="icon" href="icons/faq.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <button class="cti">
            <div class="CTI">InsiderKeeps Dev</div>
        </button>
        <nav>
            <a class="animbutt" href="https://farmerok.github.io"><span id="home-text"></span></a>
            <a class="animbutt" href="project"><span id="projects-text"></span></a>
        </nav>
    </header>
    
    <main>
        <h2><span id="welcome-faq-text"></span></h2>
        <p class="purple-text"><span id="description-text"></span></p>
        
        <div class="faq">
            <div class="question-container">
                <div class="question">

                    <h3>1. <span id="question-1-text"></span></h3>
                    <button class="expand-button"><span id="expand-button-1-text"></span></button>
                    <div class="answer">
                        <p><span id="answer-1-text"></span></p>
                    </div>
                </div>
        
                <div class="question">
        
                    <h3>2. <span id="question-2-text"></span></h3>
                    <button class="expand-button"><span id="expand-button-2-text"></span></button>
                    <div class="answer">
                        <p><span id="answer-2-text"></span></p>
                    </div>
                </div>
        
            </div>
        </div>
    </main>

    <script src="locales.js" type="text/javascript"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const lang = localStorage.getItem('lang') || 'en';
            const texts = locales[lang];

            document.title = texts['faqPage-text'];
            document.getElementById('home-text').textContent = texts['homePage'];
            document.getElementById('projects-text').textContent = texts['button_procejts'];
            document.getElementById('welcome-faq-text').textContent = texts['welcome-faq'];
            document.getElementById('description-text').textContent = texts['description'];

            // Update FAQ questions and answers
            document.getElementById('question-1-text').innerHTML = texts['question-1'];
            document.getElementById('question-2-text').innerHTML = texts['question-2'];

            document.getElementById('answer-1-text').innerHTML = texts['answer-1'];
            document.getElementById('answer-2-text').innerHTML = texts['answer-2'];

            const expandButtons = document.querySelectorAll(".expand-button");

            expandButtons.forEach((button, index) => {
                button.textContent = texts['expand-button-text'];
                button.addEventListener("click", () => {
                    const answers = document.querySelectorAll(".answer");
                    if (answers[index].style.display === "block") {
                        answers[index].style.display = "none";
                        button.textContent = texts['expand-button-text'];
                    } else {
                        answers.forEach(answer => answer.style.display = "none");
                        answers[index].style.display = "block";
                        button.textContent = texts['collapse-button-text'];
                    }
                });
            });
        });
    </script>

    <footer>
        <div class="footer-content">
            <button class="button prestndinside" data-text="Awesome">
                <span class="actual-text">&nbsp;insiderkeeps&nbsp;</span>
                <span aria-hidden="true" class="hover-text">&nbsp;insiderkeeps&nbsp;</span>
            </button>
            <span class="actual-text" style="font-size: 24px; font-weight: bold; color: #ff0000;">&nbsp;2023&nbsp;</span>
            <button class="button prestndinside" data-text="Awesome">
                <span aria-hidden="true" class="hover-text">&nbsp;2023&nbsp;</span>
            </button>
        </div>
    </footer>
</body>
</html>
