<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title id="homePage-text"></title>
    <link rel="icon" href="src/icons/primary.png" sizes="64x64">
    <link rel="stylesheet" href="src/css/styles.css" type="text/css">
</head>
<body>
    <style>
        .language-select {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            background-color: #3a3030;
            padding: 8px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 4px rgb(255, 1, 1);
            transition: all 0.3s ease;
        }

        .language-select:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgb(73, 255, 1);
        }

        .language-select label {
            color: #d18989;
            font-weight: bold;
            margin-right: 5px;
        }

        .language-select select {
            padding: 1px 12px;
            border-radius: 20px;
            background-color: #b68f83;
            border: none;
            outline: none;
            transition: background-color 0.3s;
            appearance: none;
            -webkit-appearance: none;
        }
    </style>
    <header>
        <button class="cti">
            <div class="CTI"> InsiderKeeps Dev </div>
        </button>
        <nav>
            <a class="animbutt" href="https://farmerok.github.io/project"><span id="button_procejts"></span></a>
            <a class="animbutt" href="https://farmerok.github.io/faq"><span id="faqPage"></span></a>
        </nav>
        <div class="language-select">
            <label for="language"><span id="Language_Current"></span></label>
            <span id="selected-language"></span>
            <select id="language" onchange="changeLanguage(this.value)">
                <option id="select_language"></option>
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="ua">Українська</option>
                <option value="es">Español</option>
            </select>
        </div>
    </header>
    <main>
        <h1><span style="color: rgba(154, 137, 156, 0.63);" id="welcome-text"></span></h1>
        <p class="blue-text"><span style="color: rgba(184, 72, 53, 0.952);" id="partner-name"></span> - <span id="partner-description"></span></p>
        <p class="blue-text"><span id="download-info"></span></p>
        <p class="blue-text"><span id="questions-info"></span></p>
        <p class="red-text"><span id="projects-info"></span></p>
    </main>
    
    <footer>
        <div class="footer-content">
            <button class="button prestndinside" data-text="Awesome">
                <span class="actual-text">&nbsp;insiderkeeps&nbsp;</span>
                <span aria-hidden="true" class="hover-text">&nbsp;insiderkeeps&nbsp;</span>
            </button>
            <span class="actual-text" style="font-size: 24px; font-weight: bold; color: #ff0000;">&nbsp;2024&nbsp;</span>
            <button class="button prestndinside" data-text="Awesome">
                <span aria-hidden="true" class="hover-text">&nbsp;2024&nbsp;</span>
            </button>
        </div>
    </footer>

    <script src="src/scripts/locales.js" type="text/javascript"></script>
    <script src="src/scripts/scripts.js" type="text/javascript"></script>
</body>
</html>
